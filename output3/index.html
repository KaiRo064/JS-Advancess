<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript 3</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            margin-top: 10px;
            width: 100%;
        }

        th,
        td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

        .completed {
            color: green;
            font-weight: bold;
        }

        .notCompleted {
            color: red;
            font-weight: bold;
        }

        /* hide table initially */
        #todoTable {
            display: none;
        }
    </style>
</head>

<body>

    <h1>Javascript Web Output #3</h1>

    <button id="loadBtn">Load data from the API</button>
    <button id="clearBtn">Clear Table</button>

    <p>
        API:
        <a href="https://jsonplaceholder.typicode.com/todos/" target="_blank">
            https://jsonplaceholder.typicode.com/todos/
        </a>
    </p>

    <table id="todoTable">

        <thead>
            <tr>
                <th>User ID</th>
                <th>Task ID</th>
                <th>Title</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>

    </table>

    
    <script type="module" src="script.js"></script>

</body>
</html>
